<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#2f7d4f" />
  <title>Pantry &amp; Spend</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="public/icon-192.png" />
  <link rel="apple-touch-icon" href="public/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pantry" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="screen-title">Today</h1>
    <div class="header-right">
      <span id="sync-status" class="sync-status" hidden></span>
      <button id="profile-btn" class="profile-btn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <main id="app" class="app-main"><!-- screens render here --></main>

  <nav class="tabbar" role="tablist">
    <button class="tab" data-screen="home" aria-label="Today">
      <span class="tab-ico">🏠</span><span class="tab-lbl">Today</span>
    </button>
    <button class="tab" data-screen="list" aria-label="Shopping list">
      <span class="tab-ico">🛒</span><span class="tab-lbl">List</span>
      <span class="tab-badge" id="badge-list" hidden></span>
    </button>
    <button class="tab" data-screen="stock" aria-label="Inventory">
      <span class="tab-ico">🧺</span><span class="tab-lbl">Stock</span>
      <span class="tab-badge tab-badge--warn" id="badge-stock" hidden></span>
    </button>
    <button class="tab" data-screen="spend" aria-label="Spend">
      <span class="tab-ico">💸</span><span class="tab-lbl">Spend</span>
    </button>
    <button class="tab" data-screen="meals" aria-label="Meals">
      <span class="tab-ico">🍳</span><span class="tab-lbl">Meals</span>
    </button>
  </nav>

  <button id="fab" class="fab" data-act="add" aria-label="Add item">＋</button>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/config.js"></script>
  <script src="src/logic.js"></script>
  <script src="src/sync.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
