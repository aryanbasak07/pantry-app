name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check all JS
        run: |
          for f in src/*.js sw.js api/*.js; do echo "checking $f"; node --check "$f"; done
      - name: Run logic tests
        run: node test/logic.test.js
